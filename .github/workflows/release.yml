name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build (Release)
        run: |
          xcodebuild \
            -scheme SpaceInvader \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            MARKETING_VERSION=${{ env.VERSION }} \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create DMG
        run: |
          APP=$(find build/DerivedData/Build/Products/Release -maxdepth 1 -name "SpaceInvader.app" | head -1)
          mkdir -p build/dmg
          cp -R "$APP" build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create \
            -volname "SpaceInvader ${{ env.VERSION }}" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            build/SpaceInvader-${{ env.VERSION }}.dmg

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/SpaceInvader-${{ env.VERSION }}.dmg
