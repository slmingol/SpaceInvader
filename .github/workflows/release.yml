name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.3.0)'
        required: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version tag on HEAD
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]' | sort -V | tail -1)
            if [ -z "$TAG" ]; then
              echo "No release tag on this commit — skipping build."
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "VERSION=${TAG#v}" >> $GITHUB_ENV
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Import Developer ID certificate
        if: steps.tag.outputs.skip != 'true'
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm certificate.p12
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build (Release)
        if: steps.tag.outputs.skip != 'true'
        run: |
          xcodebuild \
            -scheme SpaceInvader \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            MARKETING_VERSION=${{ env.VERSION }} \
            CURRENT_PROJECT_VERSION=${{ env.VERSION }} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ env.KEYCHAIN_PATH }} --timestamp" \
            build

      - name: Re-sign app for notarization
        if: steps.tag.outputs.skip != 'true'
        run: |
          APP=$(find build/DerivedData/Build/Products/Release -maxdepth 1 -name "SpaceInvader.app" | head -1)
          IDENTITY="Developer ID Application"
          KEYCHAIN="${{ env.KEYCHAIN_PATH }}"
          ENTITLEMENTS="Sources/SpaceInvader/Resources/SpaceInvader.entitlements"

          # Sign all nested XPC services
          find "$APP" -name "*.xpc" | while read xpc; do
            codesign --force --sign "$IDENTITY" --options runtime --timestamp --keychain "$KEYCHAIN" "$xpc"
          done

          # Sign nested .app bundles (e.g. Sparkle Updater.app)
          find "$APP" -name "*.app" | while read nested; do
            [ "$nested" = "$APP" ] && continue
            codesign --force --sign "$IDENTITY" --options runtime --timestamp --keychain "$KEYCHAIN" "$nested"
          done

          # Sign loose helper executables (Autoupdate etc.)
          find "$APP/Contents/Frameworks" -maxdepth 4 -type f -perm +111 | while read bin; do
            file "$bin" | grep -q "Mach-O" && \
              codesign --force --sign "$IDENTITY" --options runtime --timestamp --keychain "$KEYCHAIN" "$bin" || true
          done

          # Sign frameworks (deepest paths first so outer bundles see signed contents)
          find "$APP/Contents/Frameworks" -name "*.framework" | sort -r | while read fw; do
            codesign --force --sign "$IDENTITY" --options runtime --timestamp --keychain "$KEYCHAIN" "$fw"
          done

          # Sign the main app bundle with entitlements (no get-task-allow)
          codesign --force --sign "$IDENTITY" --options runtime --timestamp \
            --keychain "$KEYCHAIN" \
            --entitlements "$ENTITLEMENTS" \
            "$APP"

          # Verify
          codesign --verify --deep --strict "$APP" && echo "Signature valid"
          spctl --assess --type exec "$APP" && echo "Gatekeeper OK"

      - name: Create DMG
        if: steps.tag.outputs.skip != 'true'
        run: |
          APP=$(find build/DerivedData/Build/Products/Release -maxdepth 1 -name "SpaceInvader.app" | head -1)
          mkdir -p build/dmg
          cp -R "$APP" build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create \
            -volname "SpaceInvader ${{ env.VERSION }}" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            build/SpaceInvader-${{ env.VERSION }}.dmg

      - name: Notarize and staple DMG
        if: steps.tag.outputs.skip != 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SUBMIT_OUTPUT=$(xcrun notarytool submit "build/SpaceInvader-${{ env.VERSION }}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --wait 2>&1)
          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep '^\s*id:' | head -1 | awk '{print $2}')
          if echo "$SUBMIT_OUTPUT" | grep -q "status: Invalid"; then
            echo "Notarization rejected — fetching log:"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_ID_PASSWORD"
            exit 1
          fi
          xcrun stapler staple "build/SpaceInvader-${{ env.VERSION }}.dmg"

      - name: Sign DMG for Sparkle
        if: steps.tag.outputs.skip != 'true'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_UPDATE=$(find build/DerivedData/SourcePackages/artifacts -name "sign_update" | head -1)
          KEY_FILE=$(mktemp)
          printf "%s" "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"
          SIGNATURE=$("$SIGN_UPDATE" "build/SpaceInvader-${{ env.VERSION }}.dmg" -p --ed-key-file "$KEY_FILE")
          rm -f "$KEY_FILE"
          echo "SPARKLE_SIGNATURE=$SIGNATURE" >> $GITHUB_ENV
          echo "DMG_SIZE=$(stat -f%z "build/SpaceInvader-${{ env.VERSION }}.dmg")" >> $GITHUB_ENV

      - name: Update appcast.xml
        if: steps.tag.outputs.skip != 'true'
        run: |
          DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          python3 - <<PYEOF
          import re, os

          sig     = os.environ["SPARKLE_SIGNATURE"]
          version = os.environ["VERSION"]
          date    = "$DATE"
          size    = os.environ["DMG_SIZE"]

          item = (
              "\n  <item>\n"
              f"    <title>Version {version}</title>\n"
              f"    <pubDate>{date}</pubDate>\n"
              f"    <sparkle:version>{version}</sparkle:version>\n"
              f"    <sparkle:shortVersionString>{version}</sparkle:shortVersionString>\n"
              "    <sparkle:minimumSystemVersion>15.0</sparkle:minimumSystemVersion>\n"
              "    <enclosure\n"
              f"      url=\"https://github.com/slmingol/SpaceInvader/releases/download/v{version}/SpaceInvader-{version}.dmg\"\n"
              f"      sparkle:edSignature=\"{sig}\"\n"
              f"      length=\"{size}\"\n"
              "      type=\"application/octet-stream\"\n"
              "    />\n"
              "  </item>"
          )

          with open("docs/appcast.xml") as f:
              content = f.read()

          # Remove placeholder and any existing entry for this version
          content = re.sub(r'\s*<item>.*?PLACEHOLDER_SIGNATURE.*?</item>', '', content, flags=re.DOTALL)
          content = re.sub(rf'\s*<item>.*?<sparkle:shortVersionString>{re.escape(version)}</sparkle:shortVersionString>.*?</item>', '', content, flags=re.DOTALL)
          # Prepend new item (newest first)
          content = content.replace("  </channel>", item + "\n\n  </channel>")

          with open("docs/appcast.xml", "w") as f:
              f.write(content)
          print("appcast.xml updated")
          PYEOF

      - name: Upload DMG to release
        if: steps.tag.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: build/SpaceInvader-${{ env.VERSION }}.dmg

      - name: Commit updated appcast.xml
        if: steps.tag.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "chore: update appcast.xml for v${{ env.VERSION }}"
          git pull --rebase origin main
          git push origin HEAD:main
