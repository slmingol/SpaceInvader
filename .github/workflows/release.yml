name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build (Release)
        run: |
          xcodebuild \
            -scheme SpaceInvader \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            SYMROOT=build/Products \
            build

      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -R build/Products/Release/SpaceInvader.app build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create \
            -volname "SpaceInvader" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            build/SpaceInvader.dmg

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/SpaceInvader.dmg
