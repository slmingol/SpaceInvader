name: SpaceInvader
options:
  bundleIdPrefix: com.smingolelli
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16"
  groupSortPosition: top
  createIntermediateGroups: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: "1.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

targets:
  SpaceInvader:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources/SpaceInvader
        excludes:
          - "Resources/**"
          - "Assets.xcassets"
      - path: Sources/SpaceInvader/Assets.xcassets
    resources:
      - Sources/SpaceInvader/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smingolelli.spaceinvader
        SWIFT_OBJC_BRIDGING_HEADER: Sources/SpaceInvader/App/SpaceInvader-Bridging-Header.h
        INFOPLIST_FILE: Sources/SpaceInvader/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/SpaceInvader/Resources/SpaceInvader.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: LaunchAtLogin
        product: LaunchAtLogin
      - package: Sparkle
        product: Sparkle
